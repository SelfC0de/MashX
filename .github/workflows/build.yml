name: MashX Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build
        run: |
          xcodebuild \
            -project MashX.xcodeproj \
            -scheme MashX \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Copy icons into .app bundle
        run: |
          APP=$(find build/DerivedData -name "MashX.app" | head -1)
          ICONS_SRC="MashX/Assets.xcassets/AppIcon.appiconset"
          for name in Icon-20@2x Icon-20@3x Icon-29@2x Icon-29@3x Icon-40@2x Icon-40@3x Icon-60@2x Icon-60@3x Icon-1024; do
            cp "$ICONS_SRC/${name}.png" "$APP/${name}.png"
          done
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string Icon-60@2x" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:1 string Icon-60@3x" "$APP/Info.plist"

      - name: Package .app as zip
        run: |
          APP=$(find build/DerivedData -name "MashX.app" | head -1)
          APP_DIR=$(dirname "$APP")
          cd "$APP_DIR"
          zip -r "$GITHUB_WORKSPACE/MashX.zip" "MashX.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MashX-${{ github.run_number }}
          path: MashX.zip
          retention-days: 14
