name: MashX Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          ls /Applications/ | grep Xcode || true
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | tail -1)/Contents/Developer
          xcodebuild -version

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build for device (iphoneos)
        run: |
          xcodebuild \
            -project MashX.xcodeproj \
            -scheme MashX \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Copy icons into .app bundle
        run: |
          APP=$(find build/DerivedData -name "MashX.app" | head -1)
          ICONS="MashX/Assets.xcassets/AppIcon.appiconset"
          for name in Icon-20@2x Icon-20@3x Icon-29@2x Icon-29@3x Icon-40@2x Icon-40@3x Icon-60@2x Icon-60@3x Icon-1024; do
            cp "$ICONS/${name}.png" "$APP/${name}.png"
          done
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string Icon-60@2x" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:1 string Icon-60@3x" "$APP/Info.plist"

      - name: Package .app into .ipa
        run: |
          APP=$(find build/DerivedData -name "MashX.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/MashX.app
          zip -r MashX.ipa Payload
          rm -rf Payload

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MashX-${{ github.run_number }}
          path: MashX.ipa
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "MashX build ${{ github.run_number }}"
          prerelease: true
          files: MashX.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
